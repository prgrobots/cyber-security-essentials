name: Build and Deploy Site

on:
  push:
    branches: [master, main]
    paths:
      - 'slides/**/*.md'
      - 'data/generated-sessions.json'
      - 'docs/sections/**/*.md'
      - 'mkdocs.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Install Slidev
        run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build MkDocs to temp dir
        run: |
          rm -rf _site
          mkdocs build

      - name: Build Slidev to site dir
        run: |
          rm -rf site
          npx slidev build slides/*.md --out site --base /cyber-security-essentials/

      - name: Copy MkDocs content into site
        run: |
          cp -r _site/* site/ 2>/dev/null || true
          ls -la site/

      - name: Deploy to GitHub Pages
        run: |
          cd site
          git init
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          git commit -m "deploy $(date '+%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:gh-pages
