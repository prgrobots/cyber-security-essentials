name: Build and Deploy Site

on:
  push:
    branches: [master, main]
    paths:
      - 'slides/**/*.md'
      - 'data/generated-sessions.json'
      - 'docs/sections/**/*.md'
      - 'mkdocs.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Install Slidev
        run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build MkDocs
        run: mkdocs build

      - name: Build Slidev sessions one by one
        run: |
          npx slidev build slides/session_1.md --out site/session_1
          npx slidev build slides/session_2.md --out site/session_2
          npx slidev build slides/session_3.md --out site/session_3
          npx slidev build slides/session_4.md --out site/session_4
          npx slidev build slides/session_5.md --out site/session_5
          npx slidev build slides/session_6.md --out site/session_6
          npx slidev build slides/session_7.md --out site/session_7
          npx slidev build slides/session_8.md --out site/session_8
          npx slidev build slides/session_9.md --out site/session_9
          npx slidev build slides/session_10.md --out site/session_10
          npx slidev build slides/session_11.md --out site/session_11
          npx slidev build slides/session_12.md --out site/session_12
          npx slidev build slides/session_13.md --out site/session_13
          npx slidev build slides/session_14.md --out site/session_14
          npx slidev build slides/session_15.md --out site/session_15
          npx slidev build slides/session_16.md --out site/session_16
          npx slidev build slides/session_17.md --out site/session_17
          npx slidev build slides/session_18.md --out site/session_18

      - name: Deploy to GitHub Pages
        run: |
          cd site
          git init
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          git commit -m "deploy $(date '+%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:gh-pages
