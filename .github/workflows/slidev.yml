name: Build and Deploy Site

on:
  push:
    branches: [master, main]
    paths:
      - 'slides/**/*.md'
      - 'data/generated-sessions.json'
      - 'docs/sections/**/*.md'
      - 'mkdocs.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Install Slidev
        run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build MkDocs
        run: |
          rm -rf site
          mkdocs build

      - name: Build Slidev
        run: |
          npx slidev build slides/*.md --out site --base /cyber-security-essentials/
          ls -la site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
