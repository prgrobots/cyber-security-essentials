name: Build and Deploy Site

on:
  push:
    branches: [master, main]
    paths:
      - 'slides/**/*.md'
      - 'data/generated-sessions.json'
      - 'docs/sections/**/*.md'
      - 'mkdocs.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-mkdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MkDocs
        run: pip install mkdocs-material
      - name: Build MkDocs
        run: mkdocs build
      - name: Upload MkDocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site

  build-slidev:
    runs-on: ubuntu-latest
    needs: build-mkdocs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Slidev
        run: npm install -g @slidev/cli
      - name: Build Slidev
        run: |
          mkdir -p dist
          for f in slides/session_*.md; do
            name=$(basename "$f" .md)
            npx slidev build "$f" --out "dist/$name"
          done
      - name: Download MkDocs artifact
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site
      - name: Copy Slidev to site
        run: |
          cp -r dist/* site/ || true
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site