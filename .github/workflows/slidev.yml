name: Build and Deploy Site

on:
  push:
    branches: [master, main]
    paths:
      - 'slides/**/*.md'
      - 'data/generated-sessions.json'
      - 'docs/sections/**/*.md'
      - 'mkdocs.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Install Slidev
        run: npm install -g @slidev/cli @slidev/theme-default

      - name: Build MkDocs
        run: mkdocs build

      - name: Build Slidev
        run: |
          for f in slides/session_*.md; do
            name=$(basename "$f" .md)
            npx slidev build "$f" --out "site/$name"
          done

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git checkout -b gh-pages
          git add -A
          git commit -m "deploy $(date '+%Y-%m-%d %H:%M')" || true
          git push -q -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
